name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "*-wip"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests

      - name: Run handoff check
        run: scripts/handoff_check.sh
